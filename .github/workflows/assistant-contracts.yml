name: assistant-contracts

on:
  pull_request:
    paths:
      - "sistema/app/**"
      - "sistema/tests/**"
      - "sistema/cotte-frontend/js/assistente-ia*.js"
      - "tests/e2e/assistente-ia*.js"
      - ".github/workflows/assistant-contracts.yml"
  workflow_dispatch:

jobs:
  backend-contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sistema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: pip install -r requirements.txt
      - name: Run assistant contract and regression tests
        run: |
          pytest -q tests/test_assistente_unificado_v2.py \
            tests/test_tool_executor.py \
            tests/test_ai_assistente_contract.py

  frontend-e2e-assistant:
    runs-on: ubuntu-latest
    needs: backend-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install npm dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run assistant E2E regression
        run: |
          npx playwright test \
            tests/e2e/assistente-ia-desktop.spec.js \
            tests/e2e/assistente-ia-mobile.spec.js \
            tests/e2e/assistente-ia-embed.spec.js

