<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copiloto Técnico Interno</title>
  <link rel="stylesheet" href="css/style.css?v=7" />
  <style>
    .copiloto-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .copiloto-main {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 24px 24px;
      min-height: 0;
      flex: 1;
    }
    .copiloto-alert {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.28);
      color: #a16207;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
    }
    .copiloto-chat {
      background: var(--surface, #ffffff);
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
      min-height: 0;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .copiloto-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .cop-msg {
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .cop-msg.user {
      align-self: flex-end;
      background: #dff5f8;
    }
    .cop-msg.bot {
      align-self: flex-start;
      background: #f3f4f6;
    }
    .copiloto-input {
      border-top: 1px solid rgba(15, 23, 42, 0.08);
      padding: 12px;
      display: flex;
      gap: 10px;
    }
    .copiloto-input textarea {
      flex: 1;
      border: none;
      background: #f8fafc;
      border-radius: 10px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      padding: 10px 12px;
      outline: none;
      font-family: inherit;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main copiloto-wrap">
    <div class="topbar">
      <div class="page-title">Copiloto Técnico Interno</div>
    </div>

    <section class="copiloto-main">
      <div class="copiloto-alert">
        Canal interno técnico. Não use para atendimento operacional de clientes.
      </div>

      <div class="copiloto-chat">
        <div id="copilotoMessages" class="copiloto-messages">
          <div class="cop-msg bot">Pronto para apoiar com dúvidas técnicas internas do COTTE.</div>
        </div>
        <div class="copiloto-input">
          <textarea id="copilotoInput" placeholder="Descreva sua dúvida técnica..."></textarea>
          <button id="copilotoSendBtn" class="btn btn-primary" type="button">Enviar</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/utils.js?v=1"></script>
  <script src="js/api.js?v=17"></script>
  <script src="js/services/ApiService.js?v=2"></script>
  <script src="js/services/CapabilityFlagsService.js?v=1"></script>
  <script src="js/layout.js?v=5"></script>
  <script src="js/copiloto-tecnico.js?v=2"></script>
</body>
</html>
