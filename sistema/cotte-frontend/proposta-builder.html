<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <script>(function(){var t=localStorage.getItem("cotte_tema");if(t){document.documentElement.setAttribute("data-theme",t);}else{document.documentElement.setAttribute("data-theme","light");}})()</script>
  <title>COTTE — Builder de Proposta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="css/style.css?v=3">
  <link rel="stylesheet" href="css/precision-atelier.css?v=2">
  <link rel="stylesheet" href="css/comercial.css?v=5">
  <link rel="stylesheet" href="css/proposta-builder.css?v=1">
</head>
<body>

  <!-- ═══ TOPBAR FIXA ═══ -->
  <header class="pb-topbar">
    <div class="pb-topbar-left">
      <a href="comercial.html" class="pb-back-btn" title="Voltar ao Comercial">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </a>
      <div class="pb-topbar-info">
        <h1 class="pb-topbar-title" id="pb-page-title">Nova Proposta Pública</h1>
        <span class="pb-topbar-badge" id="pb-status-badge">Rascunho</span>
      </div>
    </div>
    <div class="pb-topbar-actions">
      <button class="btn btn-secondary btn-sm" id="pb-btn-cancelar">Cancelar</button>
      <button class="btn btn-primary btn-sm" id="pb-btn-salvar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Salvar
      </button>
    </div>
  </header>

  <!-- ═══ LAYOUT PRINCIPAL ═══ -->
  <div class="pb-layout">

    <!-- ── SIDEBAR ESQUERDA ── -->
    <aside class="pb-sidebar">
      <input type="hidden" id="pb-id">

      <!-- Nome da proposta -->
      <div class="pb-sidebar-section">
        <div class="fg">
          <label class="fl">Nome da Proposta *</label>
          <input type="text" class="fi" id="pb-nome" placeholder="Ex: Proposta E-commerce 2025">
        </div>
      </div>

      <!-- Blocos -->
      <div class="pb-sidebar-section">
        <div class="pb-section-header">
          <h3 class="pb-section-title">🧩 Blocos</h3>
          <button type="button" class="btn btn-sm btn-secondary" id="pb-btn-add-bloco">+ Bloco</button>
        </div>
        <p class="pb-section-hint">Arraste para reordenar. Clique para editar.</p>
        <div id="pb-blocos-list" class="pb-blocos-list">
          <!-- Blocos inseridos via JS -->
        </div>
      </div>

      <!-- Variáveis -->
      <div class="pb-sidebar-section">
        <div class="pb-section-header">
          <h3 class="pb-section-title">🔤 Variáveis</h3>
          <button type="button" class="btn btn-sm btn-secondary" id="pb-btn-add-var">+ Variável</button>
        </div>
        <div id="pb-variaveis-list" class="pb-variaveis-list">
          <!-- Variáveis inseridas via JS -->
        </div>
      </div>
    </aside>

    <!-- ── ÁREA CENTRAL: EDITOR + PREVIEW ── -->
    <main class="pb-main">

      <!-- Editor do bloco selecionado -->
      <div class="pb-editor" id="pb-editor-panel" style="display:none">
        <div class="pb-editor-header">
          <h3 class="pb-editor-title" id="pb-editor-title">Configuração do Bloco</h3>
          <button type="button" class="btn btn-sm btn-ghost" id="pb-editor-close" title="Fechar editor">✕</button>
        </div>
        <div class="pb-editor-body" id="pb-editor-body">
          <!-- Campos do bloco inseridos via JS -->
        </div>
      </div>

      <!-- Preview ao vivo -->
      <div class="pb-preview-wrapper">
        <div class="pb-preview-toolbar">
          <span class="pb-preview-label">👁 Preview ao vivo</span>
          <div class="pb-preview-device-toggle">
            <button class="pb-device-btn active" data-device="desktop" title="Desktop">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </button>
            <button class="pb-device-btn" data-device="mobile" title="Mobile">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div class="pb-preview-frame" id="pb-preview-frame">
          <div class="pb-preview-content" id="pb-preview-content">
            <!-- Preview renderizado via JS -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/utils.js?v=1"></script>
  <script src="js/api.js?v=17"></script>
  <script src="js/proposta-builder.js?v=1"></script>
</body>
</html>
