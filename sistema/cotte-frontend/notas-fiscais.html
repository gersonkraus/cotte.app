<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){var t=localStorage.getItem("cotte_tema");if(t){document.documentElement.setAttribute("data-theme",t);}else{document.documentElement.setAttribute("data-theme","light");}})()</script>
  <title>COTTE — Notas Fiscais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/style.css?v=15">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar"></aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title-wrap">
      <div class="page-title">Notas Fiscais</div>
      <div class="page-sub" id="page-sub">Notas já emitidas (altere o filtro para ver falhas ou outros status)</div>
    </div>
    <div class="topbar-actions">
      <span id="topbar-notificacoes"></span>
      <a class="btn btn-ghost nf-config-fiscal" href="configuracoes.html#sec-fiscal" title="Configurar emissão fiscal">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.65.87.094.053.194.097.298.13V4.11a1.75 1.75 0 011.75-1.75h2.5A1.75 1.75 0 0120 4.11v2.53c.104-.033.204-.077.298-.13.337-.184.587-.496.65-.87l.213-1.281c.09-.542.56-.94 1.11-.94h2.594c.55 0 1.019.398 1.11.94l.406 2.437a8.25 8.25 0 010 3.56l-.406 2.437c-.09.542-.56.94-1.11.94h-2.593c-.55 0-1.02-.398-1.11-.94l-.213-1.281a1.125 1.125 0 01-.65-.87 8.17 8.17 0 01-.298-.13v2.53A1.75 1.75 0 0118 22h-2.5a1.75 1.75 0 01-1.75-1.75v-2.53c-.104.033-.204.077-.298.13-.337.184-.587.496-.65.87l-.213 1.281c-.09.542-.56.94-1.11.94h-2.593a1.125 1.125 0 01-1.11-.94l-.406-2.438a8.25 8.25 0 010-3.56l.406-2.437z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Configurações fiscais
      </a>
    </div>
  </div>

  <!-- BUSCA + FILTROS -->
  <div class="card nf-filtros-card">
    <div class="nf-filtros-bar">
      <div class="nf-filtro-grupo nf-filtro-grupo--grow">
        <label class="nf-filtro-label" for="filtro-busca">Busca</label>
        <div class="nf-search-field">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
          </svg>
          <input type="search" id="filtro-busca" name="filtro-busca-notas" autocomplete="off" placeholder="Número, chave ou natureza da operação…" enterkeyhint="search">
        </div>
      </div>
      <div class="nf-filtro-grupo">
        <label class="nf-filtro-label" for="filtro-tipo">Tipo</label>
        <select id="filtro-tipo" aria-label="Filtrar por tipo de nota fiscal">
          <option value="">Todos os tipos</option>
          <option value="nfse">NFS-e (Serviços)</option>
          <option value="nfe">NF-e (Produtos)</option>
          <option value="nfce">NFC-e (Consumidor)</option>
        </select>
      </div>
      <div class="nf-filtro-grupo">
        <label class="nf-filtro-label" for="filtro-status">Status</label>
        <select id="filtro-status" aria-label="Filtrar por status da nota">
          <option value="emitida" selected>Emitidas</option>
          <option value="">Todos os status</option>
          <option value="pendente">Pendente</option>
          <option value="processando">Processando</option>
          <option value="cancelada">Cancelada</option>
          <option value="erro">Falhas na emissão</option>
        </select>
      </div>
      <div class="nf-filtro-grupo nf-filtro-grupo--view">
        <span class="nf-filtro-label" id="nf-view-label">Visualização</span>
        <div class="nf-view-seg" role="group" aria-labelledby="nf-view-label">
          <button type="button" id="nf-view-table" class="nf-view-seg__btn is-active" aria-pressed="true">Tabela</button>
          <button type="button" id="nf-view-cards" class="nf-view-seg__btn" aria-pressed="false">Cartões</button>
        </div>
      </div>
    </div>
  </div>

  <div id="notas-list" class="nf-list"></div>

  <div id="notas-pagination" class="nf-pagination-outer"></div>

  <div id="notas-empty" class="empty-state nf-empty" style="display:none">
    <div class="nf-empty-icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.25">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
      </svg>
    </div>
    <h3>Nenhuma nota fiscal</h3>
    <p class="desc">Não encontramos registros correspondentes à busca.</p>
  </div>

</main>

<script src="js/utils.js?v=1"></script>
<script src="js/api.js?v=18"></script>
<script src="js/layout.js?v=6"></script>
<script src="js/ux-improvements.js?v=1"></script>
<script>
  inicializarLayout('notas-fiscais');
</script>
<script src="js/notas-fiscais.js?v=6"></script>

</body>
</html>
